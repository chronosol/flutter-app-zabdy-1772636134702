name: candy_crush_clone
  description: A Flutter clone of the popular Candy Crush game with Riverpod and go_router.
  publish_to: "none"

  environment:
    sdk: ">=3.0.0 <4.0.0"

  dependencies:
    flutter:
      sdk: flutter
    flutter_riverpod: ^2.6.1
    go_router: ^14.2.0
    flutter_animate: ^4.5.0

  dev_dependencies:
    flutter_test:
      sdk: flutter

  flutter:
    uses-material-design: true
